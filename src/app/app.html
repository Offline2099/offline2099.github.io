<header>
  <h1>offline2099.github.io</h1>
</header>

<div class="intro">
  @for (paragraph of intro; track $index) {
    <p>{{ paragraph }}</p>
  }
</div>

@for (project of projects; track project.id) {
  <app-project [project]="project" />
}

<footer>
  <a app-external-link [href]="repoURL" text="Repository for this page"></a>
</footer>
